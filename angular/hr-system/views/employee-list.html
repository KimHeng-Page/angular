<h2>Employee List</h2>

<input type="text" ng-model="searchText" placeholder="Search...">

<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Position</th>
        <th>Action</th>
    </tr>

    <tr ng-repeat="emp in employees | filter:searchText">
        <td>{{emp.id}}</td>
        <td>{{emp.name}}</td>
        <td>{{emp.position}}</td>
        <td>
            <button ng-click="deleteEmployee($index)">Delete</button>
        </td>
    </tr>
</table>
