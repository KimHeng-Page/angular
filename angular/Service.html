<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"><script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
    <title>Create Service</title>
</head>
<body>
    <div ng-app="myApp" ng-controller="myData">
        <h2>{{ message }}</h2>
    </div>
    <script>
        var app = angular.module("myApp", []);
        
        app.service("MyService", function(){
            this.getMessage = function(){
                return "Welcome back to angular 1.2";
            }
        })

        app.controller("myData", function($scope, MyService){
            $scope.message = MyService.getMessage();
        });
    </script>
</body>
</html>
