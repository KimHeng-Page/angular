<section class="w-full lg:col-span-3 bg-white rounded-[5px] shadow-sm border border-gray-200">
    <div class="px-5 py-4 border-b border-gray-100 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
        <div>
            <h2 class="text-lg font-semibold text-gray-800">បញ្ជីបុគ្គលិក</h2>
        </div>

        <div class="w-full sm:w-72">
            <input
                type="text"
                ng-model="searchText"
                placeholder="ស្វែងរកទិន្នន័យ"
                class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            >
        </div>
    </div>

    <div class="overflow-x-auto">
        <table class="min-w-full text-sm">
            <thead class="bg-gray-50 text-gray-700">
                <tr>
                    <th class="px-5 py-3 text-left font-semibold">លេខID</th>
                    <th class="px-5 py-3 text-left font-semibold">ឈ្មោះ</th>
                    <th class="px-5 py-3 text-left font-semibold">អាយុ</th>
                    <th class="px-5 py-3 text-left font-semibold">ថ្ងៃខែឆ្នាំកំណើត</th>
                    <th class="px-5 py-3 text-left font-semibold">អ៊ីម៉ែល</th>
                    <th class="px-5 py-3 text-left font-semibold">អាសយដ្ឋាន</th>
                    <th class="px-5 py-3 text-left font-semibold">មុខដំណែង</th>
                    <th class="px-5 py-3 text-left font-semibold">មតិបន្ថែម</th>
                    <th class="px-5 py-3 text-left font-semibold">សម្មកភាព</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
                <tr ng-repeat="emp in getPaginatedEmployees() track by emp.id" class="hover:bg-gray-50">
                    <td class="px-5 py-3 text-gray-700">{{emp.id}}</td>
                    <td class="px-5 py-3 font-medium text-gray-800">{{emp.fullname}}</td>
                    <td class="px-5 py-3 font-medium text-gray-800">{{emp.age}}</td>
                    <td class="px-5 py-3 font-medium text-gray-800">{{emp.birth}}</td>
                    <td class="px-5 py-3 font-medium text-gray-800">{{emp.email}}</td>
                    <td class="px-5 py-3 font-medium text-gray-800">{{emp.address}}</td>
                    <td class="px-5 py-3 font-medium text-gray-800">{{emp.position}}</td>
                    <td class="px-5 py-3 font-medium text-gray-800">{{emp.description}}</td>
                    <td class="px-5 py-3">
                        <button
                            ng-click="deleteEmployee(emp.id)"
                            class="inline-flex items-center rounded-[3px] bg-red-600 px-3 py-1.5 text-xs font-semibold text-white hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-1"
                        >
                            លុប
                        </button>
                    </td>
                </tr>
                <tr ng-if="filteredEmployees.length === 0">
                    <td colspan="9" class="px-5 py-6 text-center text-sm text-gray-500">
                        មិនមានទិន្នន័យ
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="px-5 py-4 border-t border-gray-100 flex items-center justify-between gap-3">
        <p class="text-sm text-gray-600">ទំព័រ {{currentPage}} នៃ {{getTotalPages()}}</p>
        <div class="inline-flex items-center gap-2">
            <button
                type="button"
                ng-click="goToPage(currentPage - 1)"
                ng-disabled="currentPage === 1"
                ng-class="{'opacity-50 cursor-not-allowed': currentPage === 1}"
                class="rounded-[3px] border border-gray-300 px-3 py-1.5 text-sm text-gray-700 hover:bg-gray-50"
            >
                ត្រឡប់
            </button>
            <button
                type="button"
                ng-repeat="page in getPageNumbers() track by page"
                ng-click="goToPage(page)"
                ng-class="{'bg-blue-600 text-white border-blue-600 hover:bg-blue-600': currentPage === page}"
                class="rounded-[3px] border border-gray-300 px-3 py-1.5 text-sm text-gray-700 hover:bg-gray-50 min-w-9"
            >
                {{page}}
            </button>
            <button
                type="button"
                ng-click="goToPage(currentPage + 1)"
                ng-disabled="currentPage === getTotalPages()"
                ng-class="{'opacity-50 cursor-not-allowed': currentPage === getTotalPages()}"
                class="rounded-[3px] border border-gray-300 px-3 py-1.5 text-sm text-gray-700 hover:bg-gray-50"
            >
               បន្ទាប់
            </button>
        </div>
    </div>
</section>
